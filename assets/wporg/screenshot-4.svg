<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" width="1200" height="900" role="img" aria-label="Successfully imported document as native Gutenberg blocks — schematic preview">
  <title>DraftSync — Imported Gutenberg blocks preview</title>
  <desc>Schematic preview of a successfully imported document rendered as native Gutenberg blocks in the editor.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff"/>
      <stop offset="100%" stop-color="#f6f7fb"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1200" height="32" fill="#1d2327"/>
  <text x="20" y="22" font-family="-apple-system, system-ui, sans-serif" font-size="13" fill="#fff" font-weight="600">DRAFTSYNC</text>
  <text x="1180" y="22" font-family="-apple-system, system-ui, sans-serif" font-size="13" fill="#a7aaad" text-anchor="end">Howdy, admin</text>

  <rect x="0" y="32" width="1200" height="56" fill="#fff" stroke="#c3c4c7"/>
  <g font-family="-apple-system, system-ui, sans-serif" font-size="13" fill="#1d2327">
    <text x="20" y="65" font-weight="600">← DraftSync</text>
    <text x="120" y="65">Q4 Launch Plan — Master</text>
    <text x="280" y="65" fill="#8c8f94">/ published</text>
    <rect x="900" y="46" width="100" height="28" rx="4" fill="#2271b1"/>
    <text x="950" y="65" fill="#fff" font-weight="600" text-anchor="middle">Update</text>
    <rect x="1010" y="46" width="100" height="28" rx="4" fill="#fff" stroke="#2271b1"/>
    <text x="1060" y="65" fill="#2271b1" font-weight="600" text-anchor="middle">Re-sync</text>
  </g>

  <rect x="0" y="88" width="800" height="812" fill="url(#bg)"/>

  <!-- Title block -->
  <rect x="60" y="120" width="680" height="60" fill="#fff" stroke="#dcdcde" rx="4"/>
  <text x="80" y="158" font-family="-apple-system, system-ui, sans-serif" font-size="24" font-weight="700" fill="#1d2327">Q4 Launch Plan — Master</text>

  <!-- Paragraph block 1 -->
  <rect x="60" y="200" width="680" height="60" fill="#fff" stroke="#dcdcde" rx="4"/>
  <text x="80" y="222" font-family="-apple-system, system-ui, sans-serif" font-size="14" fill="#1d2327">This document outlines the cross-functional launch plan for the Q4 product release, including</text>
  <text x="80" y="242" font-family="-apple-system, system-ui, sans-serif" font-size="14" fill="#1d2327">timelines, owners, dependencies, and the go-to-market motion across web, mobile, and email.</text>

  <!-- H2 block -->
  <rect x="60" y="280" width="680" height="48" fill="#fff" stroke="#dcdcde" rx="4"/>
  <text x="80" y="312" font-family="-apple-system, system-ui, sans-serif" font-size="20" font-weight="600" fill="#1d2327">Milestones</text>

  <!-- List block -->
  <rect x="60" y="344" width="680" height="120" fill="#fff" stroke="#dcdcde" rx="4"/>
  <text x="86" y="370" font-family="-apple-system, system-ui, sans-serif" font-size="14" fill="#1d2327">•  Finalize feature scope — Oct 14 (PM: A. Chen)</text>
  <text x="86" y="396" font-family="-apple-system, system-ui, sans-serif" font-size="14" fill="#1d2327">•  Lock the public launch copy — Oct 21 (Marketing: J. Park)</text>
  <text x="86" y="422" font-family="-apple-system, system-ui, sans-serif" font-size="14" fill="#1d2327">•  Begin staged rollout — Nov 4 (Eng: S. Rao)</text>
  <text x="86" y="448" font-family="-apple-system, system-ui, sans-serif" font-size="14" fill="#1d2327">•  Public announcement — Nov 12 (Comms: L. Garcia)</text>

  <!-- H2 block -->
  <rect x="60" y="480" width="680" height="48" fill="#fff" stroke="#dcdcde" rx="4"/>
  <text x="80" y="512" font-family="-apple-system, system-ui, sans-serif" font-size="20" font-weight="600" fill="#1d2327">Risks &amp; Mitigations</text>

  <!-- Table block -->
  <rect x="60" y="544" width="680" height="180" fill="#fff" stroke="#dcdcde" rx="4"/>
  <rect x="60" y="544" width="680" height="36" fill="#f0f0f1"/>
  <text x="80" y="568" font-family="-apple-system, system-ui, sans-serif" font-size="13" font-weight="700" fill="#1d2327">Risk</text>
  <text x="280" y="568" font-family="-apple-system, system-ui, sans-serif" font-size="13" font-weight="700" fill="#1d2327">Severity</text>
  <text x="460" y="568" font-family="-apple-system, system-ui, sans-serif" font-size="13" font-weight="700" fill="#1d2327">Mitigation</text>
  <text x="80" y="604" font-family="-apple-system, system-ui, sans-serif" font-size="13" fill="#1d2327">Scope creep</text>
  <text x="280" y="604" font-family="-apple-system, system-ui, sans-serif" font-size="13" fill="#1d2327">Medium</text>
  <text x="460" y="604" font-family="-apple-system, system-ui, sans-serif" font-size="13" fill="#1d2327">Weekly review with PM lead</text>
  <text x="80" y="632" font-family="-apple-system, system-ui, sans-serif" font-size="13" fill="#1d2327">API rate limits</text>
  <text x="280" y="632" font-family="-apple-system, system-ui, sans-serif" font-size="13" fill="#1d2327">High</text>
  <text x="460" y="632" font-family="-apple-system, system-ui, sans-serif" font-size="13" fill="#1d2327">Backoff with retry queue</text>
  <text x="80" y="660" font-family="-apple-system, system-ui, sans-serif" font-size="13" fill="#1d2327">Translation delay</text>
  <text x="280" y="660" font-family="-apple-system, system-ui, sans-serif" font-size="13" fill="#1d2327">Low</text>
  <text x="460" y="660" font-family="-apple-system, system-ui, sans-serif" font-size="13" fill="#1d2327">Pre-translate 72h before launch</text>
  <text x="80" y="688" font-family="-apple-system, system-ui, sans-serif" font-size="13" fill="#1d2327">Reviewer availability</text>
  <text x="280" y="688" font-family="-apple-system, system-ui, sans-serif" font-size="13" fill="#1d2327">Low</text>
  <text x="460" y="688" font-family="-apple-system, system-ui, sans-serif" font-size="13" fill="#1d2327">Reserve backup reviewers</text>

  <!-- Image block (placeholder) -->
  <rect x="60" y="740" width="680" height="80" fill="#fff" stroke="#dcdcde" rx="4"/>
  <rect x="80" y="760" width="40" height="40" rx="4" fill="#dcdcde"/>
  <path d="M88 776 l8 8 l16 -16" fill="none" stroke="#8c8f94" stroke-width="2"/>
  <circle cx="110" cy="772" r="3" fill="#8c8f94"/>
  <text x="140" y="780" font-family="-apple-system, system-ui, sans-serif" font-size="13" font-weight="600" fill="#1d2327">launch-timeline.png</text>
  <text x="140" y="800" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#8c8f94">Sideloaded from Google Doc — alt: "Q4 launch timeline diagram."</text>

  <!-- Sidebar with block info -->
  <rect x="800" y="88" width="400" height="812" fill="#fff" stroke="#c3c4c7"/>
  <g font-family="-apple-system, system-ui, sans-serif" font-size="12" fill="#50575e">
    <rect x="800" y="88" width="100" height="36" fill="#fff"/>
    <text x="850" y="111" text-anchor="middle">DraftSync</text>
    <rect x="900" y="88" width="100" height="36" fill="#fff"/>
    <text x="950" y="111" text-anchor="middle">Document</text>
    <rect x="1000" y="88" width="100" height="36" fill="#2271b1"/>
    <text x="1050" y="111" fill="#fff" font-weight="600" text-anchor="middle">Block</text>
    <rect x="1100" y="88" width="100" height="36" fill="#fff"/>
    <text x="1150" y="111" text-anchor="middle">Page</text>
  </g>

  <text x="820" y="160" font-family="-apple-system, system-ui, sans-serif" font-size="15" font-weight="700" fill="#1d2327">Block: Table</text>

  <text x="820" y="200" font-family="-apple-system, system-ui, sans-serif" font-size="12" font-weight="600" fill="#50575e">SOURCE</text>
  <text x="820" y="220" font-family="-apple-system, system-ui, sans-serif" font-size="13" fill="#1d2327">Google Docs import</text>

  <text x="820" y="260" font-family="-apple-system, system-ui, sans-serif" font-size="12" font-weight="600" fill="#50575e">ROWS</text>
  <text x="820" y="280" font-family="-apple-system, system-ui, sans-serif" font-size="13" fill="#1d2327">4 (1 header + 3 body)</text>

  <text x="820" y="320" font-family="-apple-system, system-ui, sans-serif" font-size="12" font-weight="600" fill="#50575e">HEADINGS</text>
  <rect x="820" y="332" width="360" height="40" rx="4" fill="#2271b1"/>
  <text x="1000" y="357" font-family="-apple-system, system-ui, sans-serif" font-size="13" font-weight="600" fill="#fff" text-anchor="middle">Convert first row to &lt;thead&gt;</text>

  <text x="820" y="408" font-family="-apple-system, system-ui, sans-serif" font-size="12" font-weight="600" fill="#50575e">ALIGNMENT</text>
  <rect x="820" y="420" width="110" height="32" rx="4" fill="#2271b1"/>
  <text x="875" y="441" font-family="-apple-system, system-ui, sans-serif" font-size="13" font-weight="600" fill="#fff" text-anchor="middle">None</text>
  <rect x="940" y="420" width="80" height="32" rx="4" fill="#fff" stroke="#2271b1"/>
  <text x="980" y="441" font-family="-apple-system, system-ui, sans-serif" font-size="13" font-weight="600" fill="#2271b1" text-anchor="middle">Left</text>
  <rect x="1030" y="420" width="80" height="32" rx="4" fill="#fff" stroke="#2271b1"/>
  <text x="1070" y="441" font-family="-apple-system, system-ui, sans-serif" font-size="13" font-weight="600" fill="#2271b1" text-anchor="middle">Center</text>
  <rect x="1120" y="420" width="60" height="32" rx="4" fill="#fff" stroke="#2271b1"/>
  <text x="1150" y="441" font-family="-apple-system, system-ui, sans-serif" font-size="13" font-weight="600" fill="#2271b1" text-anchor="middle">Right</text>

  <text x="820" y="500" font-family="-apple-system, system-ui, sans-serif" font-size="12" font-weight="600" fill="#50575e">OPTIONS</text>
  <g font-family="-apple-system, system-ui, sans-serif" font-size="13" fill="#1d2327">
    <rect x="820" y="514" width="18" height="18" fill="#2271b1"/>
    <path d="M824 523 l4 4 l8 -8" fill="none" stroke="#fff" stroke-width="2"/>
    <text x="850" y="528">Fixed width table cells</text>
    <rect x="820" y="544" width="18" height="18" fill="#fff" stroke="#8c8f94"/>
    <text x="850" y="558">Strip inline formatting</text>
  </g>

  <rect x="0" y="860" width="1200" height="40" fill="#1d2327" opacity="0.85"/>
  <text x="600" y="886" font-family="-apple-system, system-ui, sans-serif" font-size="13" fill="#a7aaad" text-anchor="middle">Schematic preview — real screenshots should be captured from a running WordPress install before submission.</text>
</svg>
