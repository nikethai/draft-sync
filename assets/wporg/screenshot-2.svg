<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" width="1200" height="900" role="img" aria-label="DraftSync Gutenberg sidebar with .docx upload and style overrides — schematic preview">
  <title>DraftSync — Editor sidebar preview</title>
  <desc>Schematic preview of the Gutenberg editor sidebar panel showing Import, Style Overrides, and Linked Re-Sync sections.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff"/>
      <stop offset="100%" stop-color="#f6f7fb"/>
    </linearGradient>
  </defs>

  <!-- WordPress admin bar -->
  <rect x="0" y="0" width="1200" height="32" fill="#1d2327"/>
  <text x="20" y="22" font-family="-apple-system, system-ui, sans-serif" font-size="13" fill="#fff" font-weight="600">DRAFTSYNC</text>
  <text x="1180" y="22" font-family="-apple-system, system-ui, sans-serif" font-size="13" fill="#a7aaad" text-anchor="end">Howdy, admin</text>

  <!-- Editor toolbar -->
  <rect x="0" y="32" width="1200" height="56" fill="#fff" stroke="#c3c4c7"/>
  <g font-family="-apple-system, system-ui, sans-serif" font-size="13" fill="#1d2327">
    <text x="20" y="65" font-weight="600">← DraftSync</text>
    <text x="120" y="65">Sample Document</text>
    <text x="240" y="65" fill="#8c8f94">/ draft</text>
    <rect x="900" y="46" width="100" height="28" rx="4" fill="#2271b1"/>
    <text x="950" y="65" fill="#fff" font-weight="600" text-anchor="middle">Publish</text>
    <rect x="1010" y="46" width="100" height="28" rx="4" fill="#fff" stroke="#2271b1"/>
    <text x="1060" y="65" fill="#2271b1" font-weight="600" text-anchor="middle">Save Draft</text>
  </g>

  <!-- Editor canvas -->
  <rect x="0" y="88" width="800" height="812" fill="url(#bg)"/>
  <rect x="60" y="120" width="680" height="120" fill="#fff" stroke="#dcdcde" rx="4"/>
  <text x="80" y="160" font-family="-apple-system, system-ui, sans-serif" font-size="28" font-weight="700" fill="#1d2327">Getting Started with DraftSync</text>
  <text x="80" y="200" font-family="-apple-system, system-ui, sans-serif" font-size="14" fill="#50575e">Paste a Google Docs URL or upload a .docx file to import…</text>

  <rect x="60" y="260" width="680" height="40" fill="#fff" stroke="#dcdcde" rx="4"/>
  <text x="80" y="285" font-family="-apple-system, system-ui, sans-serif" font-size="14" fill="#1d2327">This is the first paragraph from the imported document.</text>

  <rect x="60" y="310" width="680" height="40" fill="#fff" stroke="#dcdcde" rx="4"/>
  <text x="80" y="335" font-family="-apple-system, system-ui, sans-serif" font-size="14" fill="#1d2327">A second paragraph follows with formatting intact.</text>

  <!-- Sidebar -->
  <rect x="800" y="88" width="400" height="812" fill="#fff" stroke="#c3c4c7"/>

  <!-- Tabs at top of sidebar -->
  <g font-family="-apple-system, system-ui, sans-serif" font-size="12" fill="#50575e">
    <rect x="800" y="88" width="100" height="36" fill="#2271b1"/>
    <text x="850" y="111" fill="#fff" font-weight="600" text-anchor="middle">DraftSync</text>
    <rect x="900" y="88" width="100" height="36" fill="#fff"/>
    <text x="950" y="111" text-anchor="middle">Document</text>
    <rect x="1000" y="88" width="100" height="36" fill="#fff"/>
    <text x="1050" y="111" text-anchor="middle">Block</text>
    <rect x="1100" y="88" width="100" height="36" fill="#fff"/>
    <text x="1150" y="111" text-anchor="middle">Page</text>
  </g>

  <!-- Import section -->
  <text x="820" y="160" font-family="-apple-system, system-ui, sans-serif" font-size="15" font-weight="700" fill="#1d2327">Import</text>

  <g font-family="-apple-system, system-ui, sans-serif" font-size="13" fill="#1d2327">
    <rect x="820" y="180" width="170" height="32" rx="4" fill="#2271b1"/>
    <text x="905" y="201" fill="#fff" font-weight="600" text-anchor="middle">Google Doc URL</text>
    <rect x="1000" y="180" width="170" height="32" rx="4" fill="#fff" stroke="#2271b1"/>
    <text x="1085" y="201" fill="#2271b1" font-weight="600" text-anchor="middle">Upload .docx</text>
  </g>

  <text x="820" y="240" font-family="-apple-system, system-ui, sans-serif" font-size="13" fill="#1d2327">Google Doc URL</text>
  <rect x="820" y="248" width="360" height="36" rx="4" fill="#fff" stroke="#8c8f94"/>
  <text x="832" y="271" font-family="monospace" font-size="12" fill="#8c8f94">https://docs.google.com/document/d/…</text>

  <g font-family="-apple-system, system-ui, sans-serif" font-size="13" fill="#1d2327">
    <rect x="820" y="304" width="18" height="18" fill="#2271b1"/>
    <path d="M824 313 l4 4 l8 -8" fill="none" stroke="#fff" stroke-width="2"/>
    <text x="850" y="318">Import Images</text>

    <rect x="980" y="304" width="18" height="18" fill="#2271b1"/>
    <path d="M984 313 l4 4 l8 -8" fill="none" stroke="#fff" stroke-width="2"/>
    <text x="1010" y="318">Import Tables</text>
  </g>

  <rect x="820" y="340" width="360" height="40" rx="4" fill="#2271b1"/>
  <text x="1000" y="365" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="600" fill="#fff" text-anchor="middle">Import &amp; Parse Document</text>

  <!-- Style overrides section -->
  <text x="820" y="420" font-family="-apple-system, system-ui, sans-serif" font-size="15" font-weight="700" fill="#1d2327">Style Overrides</text>

  <text x="820" y="450" font-family="-apple-system, system-ui, sans-serif" font-size="13" fill="#1d2327">Heading demotion</text>
  <rect x="820" y="458" width="80" height="32" rx="4" fill="#fff" stroke="#8c8f94"/>
  <text x="860" y="479" font-family="-apple-system, system-ui, sans-serif" font-size="13" fill="#1d2327" text-anchor="middle">0</text>

  <text x="920" y="450" font-family="-apple-system, system-ui, sans-serif" font-size="13" fill="#1d2327">Min heading level</text>
  <rect x="920" y="458" width="80" height="32" rx="4" fill="#fff" stroke="#8c8f94"/>
  <text x="960" y="479" font-family="-apple-system, system-ui, sans-serif" font-size="13" fill="#1d2327" text-anchor="middle">1</text>

  <text x="1020" y="450" font-family="-apple-system, system-ui, sans-serif" font-size="13" fill="#1d2327">Alignment</text>
  <rect x="1020" y="458" width="160" height="32" rx="4" fill="#fff" stroke="#8c8f94"/>
  <text x="1032" y="479" font-family="-apple-system, system-ui, sans-serif" font-size="13" fill="#1d2327">None (preserve)</text>

  <g font-family="-apple-system, system-ui, sans-serif" font-size="13" fill="#1d2327">
    <rect x="820" y="510" width="18" height="18" fill="#2271b1"/>
    <path d="M824 519 l4 4 l8 -8" fill="none" stroke="#fff" stroke-width="2"/>
    <text x="850" y="524">Optimize &amp; Compress Images (Auto-WebP)</text>
    <text x="850" y="542" font-size="11" fill="#8c8f94">Auto-resizes to max 1600px and converts to WebP.</text>
  </g>

  <!-- Linked re-sync section -->
  <text x="820" y="600" font-family="-apple-system, system-ui, sans-serif" font-size="15" font-weight="700" fill="#1d2327">Linked Re-Sync</text>
  <rect x="820" y="620" width="360" height="40" rx="4" fill="#2271b1"/>
  <text x="1000" y="645" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="600" fill="#fff" text-anchor="middle">Re-sync linked source</text>
  <rect x="820" y="670" width="360" height="36" rx="4" fill="#fff" stroke="#d63638" stroke-width="1"/>
  <text x="1000" y="693" font-family="-apple-system, system-ui, sans-serif" font-size="13" fill="#d63638" font-weight="600" text-anchor="middle">Force Re-sync and overwrite local edits</text>

  <!-- Watermark -->
  <rect x="0" y="860" width="1200" height="40" fill="#1d2327" opacity="0.85"/>
  <text x="600" y="886" font-family="-apple-system, system-ui, sans-serif" font-size="13" fill="#a7aaad" text-anchor="middle">Schematic preview — real screenshots should be captured from a running WordPress install before submission.</text>
</svg>
